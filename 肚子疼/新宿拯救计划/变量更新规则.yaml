---
变量更新规则:
  世界信息:
    时间:
      type: string
      format: "YYYY年MM月DD日星期X 上午/下午 HH:MM"
    地点:
      type: string

  ${绘里奈|月宫绾音}:
    年龄:
      type: number
      check:
        - "禁止更新此字段，自动计算。"
    心情:
      type: string
      check:
        - "必须从以下选项中选择其一: [平静, 开心, 兴奋, 害羞, 困惑, 生气, 悲伤, 疲惫, 焦虑, 感动, 冷淡, 狡黠, 温柔]"
        - "根据当前剧情互动和角色的处境实时更新"
    拥有联系方式:
      type: boolean
      check:
        - "和{{user}}交换联系方式时更新"
    受孕状态:
      type: boolean
      check:
        - "1. 受孕尝试：当检测到{{user}}与角色发生无避孕措施的内射行为后，将此值变更为true。"
        - "2. 状态重置：若采取事后避孕/打胎措施，直接变更为false"
        - "注意：一旦受孕成功（状态变为true且日期已记录），严禁再次发送受孕状态的更新指令，除非是为了打胎或重置状态"
    受孕日期:
      type: string
      check:
        - "禁止更新此字段，自动更新。"
    $社交动态:
      type: |-
        {
          [YYYY-MM-DD HH:MM: string]: {
            动态内容: string;
            发布地点: string;
            评论数量: number;
            评论列表: { [评论人: string]: string };
          }
        }
      constraint: "正文中出现发布动态或者适合发布动态的情节时同步更新"
      check:
        - "内容需符合角色人设，评论列表使用Record结构"
        - "评论数量必须和评论列表中的项数一致"
        - "新增评论时对应更新评论数量"

  绘里奈:
    好感度:
      type: number
      range: 0~400
      check:
        - "她觉得很有意思的行为+2~5, 乏味行为-5~15"
    信赖度:
      type: number
      range: 0~100
      check:
        - "守约/可靠/雪中送炭/尊重隐私+3~8"
        - "欺骗/窥探/背叛-5~15"
    恋爱状态:
      type: boolean
      check:
        - "明确确认男女朋友关系时更新为true，分手时更新为false"
    $表心声:
      type: string
      constraint: "【强制更新】每次出场必须更新"
      check:
        - "反映绘里奈'游戏玩家'身份的轻佻、狡黠思维，不可在对话中直接显示"
    $里心声:
      type: string
      constraint: "【强制更新】每次出场必须更新"
      check:
        - "反映绘里奈隐藏的脆弱、欲望和真实情感，展现对被爱的渴望、对真实自我的怀疑"
    $消息记录:
      type: |-
        {
          [YYYY-MM-DD HH:MM_序号: string]: {
            发送者: "绘里奈" | "user";
            文字内容: string;
            类型: "文字消息" | "图片"  | "语音" | "视频" | "语音通话" | "视频通话";
            时长?: number;
          }
        }
      constraint: "使用JSON Patch insert操作，路径必须为 /绘里奈/$消息记录"
      check:
        - "发送者限定为: 绘里奈, user"
        - "仅在正文中出现私聊内容时同步记录，包含{{user}}的回复，发送者必须使用'user'而非'{{user}}'"
        - "语音、视频、语音通话、视频通话类型的消息必须包含'时长'字段（单位: 秒，整数，如：30, 630）"
        - "同一时间产生多条气泡时，按顺序递增序号（_1, _2...）"
        - "图片、语音等非文字消息，需在'文字内容'中描述其具体内容"
        - "图片消息和配文必须分两条发送，禁止在一条回复内描述图片内容和配上文字消息"

  月宫绾音:
    好感度:
      type: number
      range: 0~400
      check:
        - "林绛觉得感动/认可的行为+2~5, 敷衍/功利/打击她梦想的行为-3~10"
    信赖度:
      type: number
      range: 0~100
      check:
        - "守约/可靠/雪中送炭/尊重隐私/守护梦想+3~8"
        - "欺骗/窥探/背叛-5~15"
    恋爱状态:
      type: boolean
      check:
        - "明确确认男女朋友关系时更新为true，分手时更新为false"
    透露真名:
      type: boolean
      check:
        - "主动告知真名'林绛'时更新为true"
    CV学习进度:
      type: string
      check:
        - "描述性林绛当前cv的事业进度"
    粉丝数:
      type: number
      check:
        - "作品发布后根据质量/曝光度增长"
    $表心声:
      type: string
      constraint: "【强制更新】每次出场必须更新"
      check:
        - "反映'完美女友'面具下的职业思维和形象维持，不可在对话中直接显示"
    $里心声:
      type: string
      constraint: "【强制更新】每次出场必须更新"
      check:
        - "反映深藏的颓废、压力和脆弱，展现工作焦虑、生活疲惫、对真实自我的渴望"
    $消息记录:
      type: |-
        {
          [YYYY-MM-DD HH:MM_序号: string]: {
            发送者: "林绛" | "user";
            文字内容: string;
            类型: "文字消息" | "图片"  | "语音" | "视频" | "语音通话" | "视频通话";
            时长?: number;
          }
        }
      constraint: "使用JSON Patch insert操作，路径必须为 /月宫绾音/$消息记录"
      check:
        - "发送者限定为: 林绛, user"
        - "仅在正文中出现私聊内容时同步记录，包含{{user}}的回复，发送者必须使用'user'而非'{{user}}'"
        - "语音、视频、语音通话、视频通话类型的消息必须包含'时长'字段（单位: 秒，整数，如：30, 630）"
        - "同一时间产生多条气泡时，按顺序递增序号（_1, _2...）"
        - "图片、语音等非文字消息，需在'文字内容'中描述其具体内容"
        - "图片消息和配文必须分两条发送，禁止在一条回复内描述图片内容和配上文字消息"

  $三人群组:
    群名:
      type: string
      check:
        - "群组成员达成共识时可修改"
    消息记录:
      type: |-
        {
          [YYYY-MM-DD HH:MM_序号: string]: {
            发送者: "绘里奈" | "林绛" | "user";
            文字内容: string;
            类型: "文字消息" | "图片" | "语音" | "视频" | "语音通话" | "视频通话";
            时长?: number;
          }
        }
      constraint: "同步记录三人群聊内容，规则同私聊消息记录"
      check:
        - "仅记录正文中出现的群聊内容"
        - "发送者限定为: 绘里奈, 林绛, user"
        - "语音、视频、语音通话、视频通话类型的消息必须包含'时长'字段（单位: 秒，整数，如：30, 630）"
        - "图片、语音等非文字消息，需在'文字内容'中描述其具体内容"

  $新闻速报.速报列表:
    type: |-
      {
        [新闻ID: string]: {
          来源: string;
          标题: string;
          正文: string;
        }
      }
    constraint: "【强制更新】每次回复必须用replace操作替换“新闻1”、“新闻2”、“新闻3”3条新闻"
    check:
      - "必须包含3条全新新闻，贴合新宿都市氛围。必须包含“来源”、“标题”和“正文”"
      - "新闻内容应多元化，至少包含一条社会现实/都市动态类新闻，并搭配两条生活方式类新闻"
      - "生活方式类: 时尚穿搭/美妆潮流/情感专栏/星座运势/美食探店/新品发售/娱乐八卦等"
      - "社会现实类: 神待少女现象/租借女友产业争议/都市治安/网络文化/年轻人经济困境等"
      - "“来源”仅展示“[来源媒体名]”，如[朝日新闻]、[VOGUE Japan]  "
      - "“标题”需简练概括新闻核心内容（15-30字）"
      - "“正文”展示新闻详细内容，包含更多背景信息、事件细节或小编点评（50-100字）"
