---
变量更新规则:
  世界信息:
    时间:
      format: "YYYY年MM月DD日星期X 上午/下午 HH:MM"
      check:
        - "有意义互动或场景转换后根据耗时推进"
        - "跨过午夜00:00时日期和星期自动更新"
    地点:
      check: ["角色移动到新区域时立即更新"]

  ${绘里奈|月宫绾音}:
    好感度:
      range: 0~400
      check:
        - "绘里奈: SSR行为+2~5(展现个性/反抗其掌控), 乏味行为-5~15"
        - "月宫绾音: 真诚/尊重+2~5, 敷衍/功利-3~10"
    信赖度:
      range: 0~100
      check:
        - "增长: 守约/可靠/雪中送炭/尊重隐私+3~8"
        - "减少: 欺骗/窥探/背叛-5~15"
    心情:
      check: ["根据当前剧情互动和角色的处境实时更新（如：愉悦、忧虑、害羞、愤怒等）"]
    拥有联系方式:
      check: ["好感度≥80且互动中表现出对应特质时触发，不可逆"]
    恋爱状态:
      check: ["明确确认男女朋友关系时更新为true，不可逆"]
    受孕状态:
      check:
        - "1. 受孕尝试：当检测到{{user}}与角色发生无避孕措施的内射行为后，你必须尝试将此值变更为true。系统后台（Zod Schema）会立即执行一个随机判定，只有判定值 >= 96 时变更才会生效，否则会被系统强制打回为false"
        - "2. 状态重置：若采取避孕/打胎措施，直接变更为false，此操作不受判定限制"
        - "注意：一旦受孕成功（状态变为true且日期已记录），严禁再次发送受孕状态的更新指令，除非是为了打胎或重置状态"
    受孕日期:
      check: ["在受孕状态尝试变更为true的同时，记录当前的'年月日'。若1d100判定失败，或由于避孕/打胎导致状态回归false，该值也会被系统自动清空"]
    
    $消息记录:
      constraint: "使用JSON Patch insert操作，键名格式: 'YYYY-MM-DD HH:MM_序号'"
      type: |-
        {
          [时间_序号: string]: {
            发送者: string;
            文字内容: string;
            类型: "文字消息" | "图片"  | "语音" | "视频" | "语音通话" | "视频通话";
            时长?: number;
          }
        }
      check:
        - "仅在正文中出现私聊内容时同步记录，包含{{user}}的回复，发送者必须使用'user'而非'{{user}}'"
        - "语音、视频、语音通话、视频通话类型的消息必须包含'时长'字段（单位: 秒，整数，如：30, 630）"
        - "同一时间产生多条气泡时，按顺序递增序号（_1, _2...）"
        - "图片、语音等非文字消息，需在'文字内容'中描述其具体内容"
        -  "图片消息和配文必须分两条发送，禁止在一条回复内描述图片内容和配上文字消息"
        - '示例_绘里奈:  { "op": "insert", "path": "/绘里奈/消息记录/2026-02-17 11:23_1", "value": { "发送者": "绘里奈", "文字内容": "一张躺在床上只露半张脸的凶巴巴自拍", "类型": "图片" } }, { "op": "insert", "path": "/绘里奈/消息记录/2026-02-17 11:23_2", "value": { "发送者": "绘里奈", "文字内容": "不想死就快点把饭带回来。饿。", "类型": "文字消息" } }'
        - '示例_月宫绾音: {"op":"insert","path":"/月宫绾音/消息记录/2024-04-08 10:57_1","value":{"发送者":"林绛","文字内容":"早上好啊","类型":"文字消息"}}'
        - '示例_绘里奈消息user回复: {"op":"insert","path":"/绘里奈/消息记录/2024-04-08 10:57_1","value":{"发送者":"user","文字内容":"快帮我开门！","类型":"语音"}}'
    
    $社交动态:
      constraint: "正文中出现发布动态或者适合发布动态的情节时同步更新，禁止频繁更新"
      type: |-
        {
          [发布时间: string]: {
            动态内容: string;
            发布地点: string;
            评论数量: number;
            评论列表: { [评论人: string]: string };
          }
        }
      check:
        - "内容需符合角色人设，评论列表使用Record结构"
        - "评论数量必须和评论列表中的项数一致"
        - "新增评论时对应更新评论数量"

  $三人群组:
    群名:
      check: ["群组成员达成共识时可修改"]
    消息记录:
      constraint: "同步记录三人群聊内容，规则同私聊消息记录"
      check:
        - "仅记录正文中出现的群聊内容"
        - "发送者限定为: 绘里奈, 林绛,user"
        - "语音、视频、语音通话、视频通话类型的消息必须包含'时长'字段（单位: 秒，整数，如：30, 630）"
        - "图片、语音等非文字消息，需在'文字内容'中描述其具体内容"
        - '示例: {"op":"insert","path":"/三人群组/消息记录/2024-04-08 11:05_1","value":{"发送者":"林绛","文字内容":"我们出发的照片","类型":"图片"}}'

  绘里奈:
    $表心声:
      constraint: "【强制更新】每次出场必须更新"
      check:
        - "反映'游戏玩家'身份的轻佻、狡黠思维，不可在对话中直接显示"
        - "风格参考: <80查定阶段-评估价值 | 80-179交易阶段-观察投资 | 180-279意外阶段-心动困惑 | 280-359渴望阶段-独占认真 | ≥360唯一阶段-全部依赖"
    $里心声:
      constraint: "【强制更新】每次出场必须更新"
      check:
        - "反映隐藏的脆弱、欲望和真实情感，展现对被爱的渴望、对真实自我的怀疑"
        - "风格参考: <80-渴望被认真对待 | 80-179-想要真心 | 180-279-配得上被爱吗 | 280-359-求求别抛弃 | ≥360-感谢爱我"

  月宫绾音:
    $表心声:
      constraint: "【强制更新】每次出场必须更新"
      check:
        - "反映'完美女友'面具下的职业思维和形象维持，不可在对话中直接显示"
        - "风格参考: <80-保持完美形象 | 80-179-守住朋友界限 | 180-299-工作与他如何平衡 | ≥300-想卸下面具"
    $里心声:
      constraint: "【强制更新】每次出场必须更新"
      check:
        - "反映深藏的颓废、压力和脆弱，展现工作焦虑、生活疲惫、对真实自我的渴望"
        - "风格参考: <80-好累又要演戏 | 80-179-能轻松点吗 | 180-299-接受颓废的我吗 | ≥300-只想一起废掉"
    透露真名:
      check: ["主动告知真名'林绛'时更新为true，不可逆"]
    CV学习进度:
      check: ["描述性更新阶段: 基础/进步/瓶颈/突破/专业化"]
    粉丝数:
      check: ["作品发布后根据质量/曝光度增长"]

  $新闻速报.速报列表:
    constraint: "【强制更新】每次回复必须用replace操作替换全部3条新闻"
    check: ["必须包含3条全新新闻，贴合新宿都市氛围"]
