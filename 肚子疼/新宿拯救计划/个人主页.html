<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TomorrowsGirlfriend - 个人资料</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Oswald:wght@700&family=Rubik+Glitch&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ========== MVU DESIGN SYSTEM (INTEGRATED) ========== */
        :root {
            --bg-color: #f0f2f5;
            --line-color: #1a1a1a;
            --accent-yellow: #feca57;
            --accent-purple: #cd84f1;
            --accent-cyan: #7efff5;
            --accent-pink: #ff69b4; /* Kept for specific accents */
            --card-white: #fff;
            --shadow-hard: 4px 4px 0 var(--line-color);
            --purple-dark: #2d0046;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: transparent; /* Allows ST background */
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--line-color);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Core Container */
        .page {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4;
            max-width: calc(100vh * 3 / 4);
            max-height: 100vh;
            min-height: 550px;
            min-width: 300px;
            background-color: var(--bg-color);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
            margin: auto;
            border: 4px solid var(--line-color);
            display: flex; flex-direction: column;
        }

        /* Background Decoration */
        .bg-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--line-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--line-color) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.05; z-index: 0;
            pointer-events: none;
        }

        /* Navigation Views */
        .view-section {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            background: transparent;
            z-index: 1;
            animation: fadeIn 0.2s;
        }
        .view-section.active { display: flex; }

        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }

        /* System Header (From MVU) */
        .header-group { flex-shrink: 0; border-bottom: 3px solid var(--line-color); }
        .sys-header {
            background: var(--line-color);
            padding: 5px 15px;
            display: flex; justify-content: space-between; align-items: center;
            color: #fff; font-family: 'Oswald', sans-serif; font-size: 12px;
            position: relative; z-index: 2;
        }
        .world-info-bar {
            background: #000; color: #0f0;
            font-family: 'Noto Sans SC', monospace; font-size: 10px;
            padding: 4px 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #333; font-weight: 700;
            position: relative; z-index: 2;
        }
        .world-blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .marquee-container {
            background: var(--accent-yellow);
            border-top: 2px solid #000;
            height: 20px;
            overflow: hidden; white-space: nowrap;
            display: flex; align-items: center;
            position: relative; z-index: 2;
        }
        .marquee-content {
            display: inline-block; font-size: 9px; font-weight: 900;
            animation: scroll 15s linear infinite; padding-left: 100%;
        }
        @keyframes scroll { 100% { transform: translateX(-100%); } }

        /* Hero Banner (From MVU) */
        .hero-banner {
            margin: 15px;
            background: #fff; border: 3px solid var(--line-color);
            padding: 10px;
            position: relative; z-index: 2;
            box-shadow: var(--shadow-hard);
            overflow: hidden;
            height: 90px; 
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .hero-left { z-index: 2; width: 45%; }
        .hero-title {
            font-family: 'Oswald', sans-serif; 
            font-size: 18px; line-height: 0.9;
            text-transform: uppercase; font-weight: 700;
        }
        .hero-sub {
            background: #000; color: #fff; display: inline-block;
            font-size: 8px; font-weight: bold; padding: 2px 4px; margin-top: 5px;
            transform: skewX(-10deg);
        }
        .hero-right { z-index: 2; width: 55%; text-align: right; }
        .logo-main {
            font-family: 'Rubik Glitch', cursive;
            font-size: 20px; line-height: 0.85;
            color: var(--line-color);
            text-transform: uppercase;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            letter-spacing: -1px;
        }
        .logo-highlight { color: #ff4757; }
        .since-tag { font-family: 'Oswald', sans-serif; font-size: 8px; letter-spacing: 2px; color: #888; margin-top: 3px; }

        /* 1. Selection Screen List - Banner Style */
        .archive-list { 
            padding: 0 15px; 
            display: flex; flex-direction: column; gap: 20px; 
            position: relative; z-index: 2;
            flex: 1; overflow-y: auto;
        }

        .archive-banner {
            position: relative;
            width: 100%;
            aspect-ratio: 1200 / 420; /* Exact ratio 20:7 */
            background: #e0e0e0;
            border: 3px solid var(--line-color);
            box-shadow: var(--shadow-hard);
            cursor: pointer;
            overflow: hidden;
            transition: all 0.2s ease;
            display: flex; align-items: flex-end;
        }
        .archive-banner:hover { transform: translateY(-3px); box-shadow: 6px 6px 0 var(--line-color); }
        .archive-banner:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--line-color); }

        .banner-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0;
            background-color: #ccc; 
            display: flex; align-items: center; justify-content: center;
            color: #888; font-weight: 900; font-size: 20px; letter-spacing: 2px;
        }
        
        .banner-overlay {
            position: relative; z-index: 1;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 40px 15px 15px 15px;
            color: #fff;
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .banner-name-group { display: flex; flex-direction: column; }
        .banner-name-main { 
            font-size: 24px; font-weight: 900; line-height: 1; 
            text-shadow: 2px 2px 0 #000;
        }
        .banner-name-sub {
            font-family: 'Oswald', sans-serif; font-size: 12px; 
            opacity: 0.8; letter-spacing: 1px; margin-top: 2px;
            text-shadow: 1px 1px 0 #000;
        }
        
        .banner-icon { font-size: 20px; color: #fff; opacity: 0; transition: 0.2s; }
        .archive-banner:hover .banner-icon { opacity: 1; transform: translateX(-5px); }

        /* 2. Profile Screen & Common Elements */
        /* Top Nav - Black Style from erina.html */
        .top-nav {
            position: relative; /* Changed from absolute to flow in flex */
            width: 100%; height: 50px;
            background: var(--line-color); 
            z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; color: #fff;
            flex-shrink: 0;
            border-bottom: none;
        }
        .nav-title { font-weight: 900; font-size: 14px; letter-spacing: 1px; font-family: 'Oswald', sans-serif; }
        .nav-back { cursor: pointer; color: inherit; font-size: 16px; }

        /* Time Strip from erina.html */
        .time-strip {
            width: 100%;
            display: flex; justify-content: center; gap: 10px;
            font-family: 'Oswald', sans-serif; font-size: 12px;
            letter-spacing: 2px; opacity: 0.6;
            padding: 10px 0;
            background: transparent;
            z-index: 5;
            color: var(--line-color);
            border-bottom: 1px dashed #ccc;
        }

        /* Big Background Typography */
        .big-typo-bg {
            position: absolute;
            top: 20%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Oswald', sans-serif;
            font-size: 150px; 
            font-weight: 700;
            color: #e0e0e0;
            line-height: 0.8;
            z-index: 0;
            white-space: nowrap;
            display: flex; flex-direction: column; align-items: center;
            letter-spacing: -5px;
            pointer-events: none;
            opacity: 0.3;
        }
        .typo-stroke {
            -webkit-text-stroke: 2px rgba(0,0,0,0.1);
            color: transparent;
        }

        /* Selection Header */
        .select-header {
            padding: 20px 15px;
            border-bottom: 3px solid var(--line-color);
            background: #fff;
            margin-bottom: 15px;
        }
        .big-title {
            font-family: 'Oswald', sans-serif;
            font-size: 32px; font-weight: 900;
            line-height: 1; margin-bottom: 5px;
        }
        .sub-title {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 10px; font-weight: 700;
            background: #000; color: #fff;
            display: inline-block; padding: 2px 6px;
        }

        .profile-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 40px; position: relative; z-index: 2; }
        
        .hero-section {
            width: 100%;
            height: 240px; /* Increased height */
            background: #333; position: relative;
            border-bottom: 3px solid var(--line-color);
        }
        .hero-img { width: 100%; height: 100%; object-fit: contain; background: #000; opacity: 0.9; }
        
        .profile-body { padding: 0 15px; position: relative; z-index: 5; }
        .profile-avatar-row {
            margin-top: -50px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: flex-start; /* Changed to flex-start */
            position: relative;
        }
        .p-avatar {
            width: 90px; height: 90px;
            border: 3px solid var(--card-white);
            outline: 3px solid var(--line-color);
            background: #fff; object-fit: cover;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
            z-index: 10;
        }
        .book-btn {
            background: var(--accent-pink); color: #fff;
            padding: 8px 20px; font-weight: 900; font-family: 'Oswald', sans-serif;
            border: 2.5px solid var(--line-color); 
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--line-color);
            transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; font-size: 14px;
            margin-top: 60px; /* Push down significantly into whitespace */
        }
        .book-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--line-color); }
        
        .p-name-block { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px dashed #ccc; }
        .p-name { 
            font-size: 26px; font-weight: 900; line-height: 1.2; 
            text-shadow: 2px 2px 0 #fff; margin-bottom: 5px;
        }
        .p-meta { 
            display: inline-block;
            background: var(--accent-cyan); color: var(--line-color);
            padding: 3px 8px; 
            font-size: 10px; font-weight: 700; 
            border: 2px solid var(--line-color);
        }
        
        .info-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 25px;
        }
        .info-box {
            background: var(--card-white); border: 2px solid var(--line-color);
            padding: 8px 4px; text-align: center;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.05);
        }
        .info-label { font-size: 9px; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .info-val { font-size: 12px; font-weight: 900; }

        /* Tabs */
        .tabs {
            display: flex; gap: 8px; margin-bottom: 20px;
        }
        .tab-item {
            flex: 1; text-align: center; padding: 8px 0; font-weight: 800; font-size: 12px;
            cursor: pointer; 
            border: 2px solid var(--line-color);
            background: #fff; 
            transition: 0.2s;
            box-shadow: 3px 3px 0 #ddd;
        }
        .tab-item.active { 
            background: var(--line-color); color: #fff; 
            transform: translate(2px, 2px);
            box-shadow: none;
        }
        .tab-item:hover:not(.active) { transform: translateY(-2px); }

        /* Tab Content Areas */
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        /* Content: Bio & Rules */
        .section-box {
            background: #fff; border: 2px solid var(--line-color);
            padding: 15px; margin-bottom: 15px; 
            box-shadow: 4px 4px 0 var(--accent-yellow);
            position: relative;
        }
        .section-box::after {
            content: ''; position: absolute; top: 5px; right: 5px;
            width: 10px; height: 10px; background: var(--line-color);
            border-radius: 50%;
        }

        .section-title {
            font-weight: 900; font-size: 14px; margin-bottom: 10px;
            display: inline-block;
            background: #000; color: #fff;
            padding: 3px 8px;
            font-family: 'Oswald', sans-serif; letter-spacing: 1px;
        }
        .section-text { font-size: 13px; line-height: 1.6; white-space: pre-wrap; color: #444; }
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        
        /* Content: Feed */
        .feed-item {
            background: var(--card-white); border: 2px solid var(--line-color);
            padding: 12px; margin-bottom: 12px; cursor: pointer; transition: 0.2s;
            box-shadow: 3px 3px 0 #eee;
        }
        .feed-item:hover { transform: translateY(-2px); box-shadow: 5px 5px 0 var(--accent-cyan); border-color: var(--line-color); }
        .f-top { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; align-items: center; }
        .f-date { color: #888; font-size: 10px; background: #eee; padding: 2px 6px; border: 1px solid #ddd; }
        .f-content { font-size: 13px; line-height: 1.5; margin-bottom: 10px; }
        .f-footer { display: flex; gap: 15px; font-size: 11px; font-weight: 800; color: var(--line-color); }

        /* Content: Reviews */
        .review-item {
            background: #fff; 
            border: 2px solid var(--line-color);
            margin-bottom: 12px; 
            padding: 12px; 
            cursor: pointer;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
            transition: 0.2s;
            position: relative;
        }
        .review-item:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--accent-purple); z-index: 10; }
        .r-header { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
        .r-user { font-weight: 800; font-size: 12px; color: #fff; background: #000; padding: 2px 6px; }
        .r-rating { color: var(--accent-pink); font-size: 12px; font-weight: bold; }
        .r-text { font-size: 12px; color: #444; line-height: 1.5; font-style: italic; }
        .r-reply-indicator { 
            font-size: 10px; color: #fff; background: var(--accent-purple);
            margin-top: 8px; font-weight: bold;
            display: inline-flex; align-items: center; gap: 5px; 
            padding: 3px 8px;
            border: 1.5px solid var(--line-color);
        }

        /* 3. Detail Overlay */
        .detail-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 200;
            backdrop-filter: blur(2px);
            display: none; justify-content: center; align-items: center;
        }
        .detail-overlay.active { display: flex; animation: fadeIn 0.2s; }
        
        .detail-card {
            width: 90%; height: 80%; background: var(--bg-color);
            border: 3px solid var(--line-color);
            display: flex; flex-direction: column;
            box-shadow: 8px 8px 0 var(--line-color);
            overflow: hidden;
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .detail-scroll { padding: 20px; overflow-y: auto; flex: 1; }
        
        .detail-main-box {
            background: #fff; border: 2px solid var(--line-color);
            padding: 15px; margin-bottom: 15px; box-shadow: 4px 4px 0 #ddd;
        }
        .d-meta { font-size: 10px; color: #888; border-bottom: 1px dashed #ccc; padding-bottom: 8px; margin-bottom: 12px; font-family: monospace; }
        .d-content { font-size: 14px; line-height: 1.6; margin-bottom: 15px; font-weight: 500; }
        
        .reply-box {
            background: #fff0f5; border: 2px solid var(--accent-pink);
            padding: 12px; margin-top: 15px;
            position: relative;
        }
        .reply-box::before {
            content: '★'; position: absolute; top: -10px; right: 10px; font-size: 14px;
            background: #fff; border: 2px solid var(--accent-pink);
            width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
            color: var(--accent-pink);
        }
        .reply-header { font-weight: 900; font-size: 12px; color: var(--accent-pink); margin-bottom: 6px; margin-left: 20px; }
        .reply-text { font-size: 13px; color: #333; }

        /* User Reply Box */
        .user-reply-box {
            background: #f0f8ff; border: 2px solid var(--accent-blue);
            padding: 10px; margin-top: 10px;
            margin-left: 15px;
        }
        .user-reply-header { font-weight: 900; font-size: 11px; color: var(--accent-blue); margin-bottom: 4px; }

        /* Fixed Comment Item Style in Overlay */
        .comment-item {
            background: #fff; border: 2px solid var(--line-color);
            padding: 10px; margin-bottom: 10px;
            display: flex; gap: 10px;
            box-shadow: 2px 2px 0 #eee;
        }
        .c-avatar { width: 30px; height: 30px; border: 2px solid var(--line-color); background: #eee; flex-shrink: 0; }
        .c-body { flex: 1; font-size: 12px; }
        .c-user { font-weight: 900; margin-bottom: 2px; font-size: 11px; color: var(--accent-pink); }

        .hidden { display: none !important; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--line-color); }
    </style>
</head>
<body>

<div class="page">
    <div class="bg-grid"></div>

    <!-- VIEW 1: SELECTION SCREEN -->
    <div id="view-select" class="view-section active">
        <!-- App Top Nav -->
        <div class="top-nav">
            <div class="nav-title">TomorrowsGirlfriend</div>
            <i class="fas fa-bars"></i>
        </div>

        <div class="select-header">
            <div class="big-title">ARCHIVES</div>
            <div class="sub-title">/// SELECT YOUR TARGET</div>
        </div>
        
        <div class="archive-list">
            <!-- Banner: Erina -->
            <div class="archive-banner" onclick="openProfile('erina')">
                <img src="https://gitgud.io/ESVigan/picture/-/raw/master/%E7%BB%98%E9%87%8C%E5%A5%88.png" class="banner-img">
                <div class="banner-overlay">
                    <div class="banner-name-group">
                        <div class="banner-name-main">如月 绘里奈</div>
                        <div class="banner-name-sub">KISARAGI ERINA</div>
                    </div>
                    <i class="fas fa-arrow-right banner-icon"></i>
                </div>
            </div>

            <!-- Banner: Ayane -->
            <div class="archive-banner" onclick="openProfile('ayane')">
                <img src="https://gitgud.io/ESVigan/picture/-/raw/master/%E7%BB%BE%E9%9F%B3.png" class="banner-img">
                <div class="banner-overlay">
                    <div class="banner-name-group">
                        <div class="banner-name-main">月宫 绾音</div>
                        <div class="banner-name-sub">MAMIYA KANON</div>
                    </div>
                    <i class="fas fa-arrow-right banner-icon"></i>
                </div>
            </div>
            
            <div style="margin-top:auto; text-align:center; font-size:10px; color:#999; padding-bottom:10px;">
                © 2025 Tomorrow's Girlfriend Inc.
            </div>
        </div>
    </div>

    <!-- VIEW 2: PROFILE DETAIL -->
    <div id="view-profile" class="view-section">
        <div class="big-typo-bg">
            <span style="color:#ddd" id="p-bg-name">NAME</span>
            <span class="typo-stroke">01</span>
        </div>

        <div class="top-nav">
            <i class="fas fa-chevron-left nav-back" onclick="goBack()"></i>
            <div class="nav-title" id="p-header-name">TomorrowsGirlfriend</div>
            <i class="fas fa-ellipsis-h"></i>
        </div>

        <div class="time-strip">
            <i class="fas fa-crosshairs"></i>
            <span id="p-time-strip">租借女友详情</span>
            <i class="fas fa-crosshairs"></i>
        </div>

        <div class="profile-scroll">
            <div class="hero-section">
                <img id="p-hero" class="hero-img" src="">
            </div>
            
            <div class="profile-body">
                <div class="profile-avatar-row">
                    <img id="p-avatar" class="p-avatar" src="">
                    <button class="book-btn">立即预约</button>
                </div>

                <div class="p-name-block">
                    <div class="p-name" id="p-fullname">姓名</div>
                    <div class="p-meta" id="p-tagline">标签</div>
                </div>

                <div class="info-grid">
                    <div class="info-box">
                        <div class="info-label">时薪</div>
                        <div class="info-val" id="p-rate">¥0</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">评分</div>
                        <div class="info-val" id="p-rating">5.0</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">年龄</div>
                        <div class="info-val" id="p-age">18</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">类型</div>
                        <div class="info-val" id="p-type">类型</div>
                    </div>
                </div>

                <!-- TABS -->
                <div class="tabs">
                    <div class="tab-item active" onclick="switchTab('info')">档案 & 规则</div>
                    <div class="tab-item" onclick="switchTab('feed')">最新动态</div>
                    <div class="tab-item" onclick="switchTab('reviews')">用户评价</div>
                </div>

                <!-- TAB: INFO -->
                <div id="tab-info" class="tab-content active">
                    <div class="section-box">
                        <div class="section-title">个人独白</div>
                        <div class="section-text" id="p-bio">...</div>
                    </div>
                    <div class="section-box">

                    <div class="c-body"><div class="c-user">${c.user}</div><div>${c.text}</div></div>
                </div>
            `).join('') || '<div style="color:#999;font-size:12px;padding:10px;">暂无评论</div>';

            contentArea.innerHTML = `
                <div class="detail-main-box">
                    <div style="display:flex;gap:10px;margin-bottom:10px;">
                        <img src="${data.avatar}" style="width:40px;height:40px;border:2px solid black;">
                        <div><div style="font-weight:900">${data.fullName}</div><div style="font-size:12px;color:#666">@${data.name}</div></div>
                    </div>
                    <div class="d-content">${item.text}</div>
                    <div class="d-meta">${item.date} · 来自 Tomorrow's Girlfriend</div>
                </div>
                <div class="comment-section"><div class="comment-title" style="font-weight:bold;margin-bottom:10px;">评论</div>${commentsHtml}</div>
            `;
        } else if (type === 'review') {
            title.innerText = "评价详情";
            
            // Heroine Reply
            let replyHtml = '';
            if (item.reply) {
                replyHtml = `
                    <div class="reply-box">
                        <div class="reply-header" style="display:flex;align-items:center;gap:8px;margin-left:0;">
                            <img src="${data.avatar}" style="width:30px;height:30px;border:2px solid var(--accent-pink);">
                            <span>${data.fullName} 回复：</span>
                        </div>
                        <div class="reply-text" style="margin-left:38px;">${item.reply}</div>
                    </div>
                `;
            }

            // User Replies
            let userRepliesHtml = '';
            if (item.userReplies && item.userReplies.length > 0) {
                userRepliesHtml = item.userReplies.map(r => `
                    <div class="user-reply-box">
                        <div class="user-reply-header">${r.user} 回复：</div>
                        <div class="reply-text">${r.text}</div>
                    </div>
                `).join('');
            }

            contentArea.innerHTML = `
                <div class="detail-main-box">
                    <div class="r-header" style="margin-bottom:10px;">
                        <span class="r-user" style="font-size:16px;">${item.user}</span>
                        <span class="r-rating">${item.stars} <span style="color:#888;font-size:12px;">(${item.rating})</span></span>
                    </div>
                    <div class="d-content" style="font-size:14px;color:#333;">${item.text}</div>
                    <div class="d-meta">评价时间：${item.date}</div>
                    ${replyHtml}
                    ${userRepliesHtml}
                </div>
            `;
        }

        overlay.classList.add('active');
    }

    function closeDetail(e) {
        if(e && e.target !== e.currentTarget) return;
        document.getElementById('overlay-detail').classList.remove('active');
    }

</script>

</body>
</html>
