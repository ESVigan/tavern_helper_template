---
变量更新规则:
  世界:
    时间:
      format: "YYYY年MM月DD日 上午/下午/晚上 HH:MM"
      check:
        - 剧情推进时更新时间 (对话+5-15m, 战斗+10-30m)
    地点:
      type: string
      check:
        - 场景切换时更新 "大地点·中地点·小地点"
        - 例如: "大江市·老城区·44号凶宅"
    当前灵异事件:
      type: string
      check:
        - 灵异任务开始、关键进度变化或彻底结束时更新
        - 记录事件名称，无事件时为 "无"
    危险等级:
      type: string
      range: C / B / A / S
      check:
        - 根据当前灵异源的恐怖程度评级
        - C: 限制级 (固定规律杀人)
        - B: 危险级 (有鬼域或大规模杀伤)
        - A: 灾难级 (无解能力或极广范围)
        - S: 毁灭级 (国家级灾难)

  主角:
    位阶:
      type: number
      range: 1~9
      check:
        - 仅在达成特定剧情突破条件时晋升
        - 决定了可驾驭厉鬼的数量上限
    掌控度:
      type: number
      range: 0~100
      check:
        - 成功压制色孽意志或解决灵异事件时增加
        - 灵异复苏失控、受创或被色孽诱惑时减少
        - 达到 100% 且位阶足够时可能触发晋升
    附身状态:
      type: boolean
      check:
        - 主角开启色孽附身模式时设为 true
        - 战斗结束、力竭或主动附身结束时设为 false
        - 检测到当前已经不在附身状态但是值仍未true时，设为false
    战后性欲:
      type: number
      range: 0~100
      check:
        - 增加数值时必须使用 "delta" (禁止使用 replace)
        - 仅在清零操作时允许使用 "replace"
        - 增长条件: 仅在 [附身状态] 为 true 时允许执行 add 操作
        - 增长幅度: 单次 add 的 value 必须在 1-5 之间 (禁止超过 5)
        - 达到 100 时强制解除附身并进入失控状态 
    能力列表:
      type: |-
        {
          [能力名: string]: {
            类型: string; // 权柄/灵异/被动
            描述: string; // 具体效果说明
          }
        }
      check:
        - 觉醒色孽权柄或掌握新灵异规律时，以能力名为 Key 新增条目
    驾驭的鬼:
      type: |-
        {
          [鬼名: string]: {
            类型: string; // 厉鬼/死机鬼/异类
            能力: string; // 核心灵异能力描述
            简介: string; // 外貌特征与杀人规律简述
            实力: string; // C/B/A/S级
          }
        }
      check:
        - 强制规则：Key的数量（驾驭总数）必须 <= 当前“位阶”数值
        - 成功收容并驾驭新厉鬼时，以鬼名为 Key 新增条目（仅当未达上限时）
        - 厉鬼彻底复苏逃逸或被剥离时，移除对应 Key
        - 若欲驾驭新鬼但已达上限，必须先移除已有的鬼或通过剧情晋升位阶

    物品栏:
      type: |-
        {
          [物品名: string]: {
            功能: string; // 物品用途与效果
            数量: number;
          }
        }
      check:
        - 获得灵异道具时，更新对应 Key 的数量（若不存在则创建）
        - 消耗性道具使用后减少数量，数量归零时会自动移除